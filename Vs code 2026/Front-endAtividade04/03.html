<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ong Ser Sempre Mais</title>
    <style>
        body {
            margin: 0;
            font-family: 'Verdana', sans-serif;
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #ffffffcc;
            padding: 50px 35px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            max-width: 400px;
        }

        h1 {
            color: #34495e;
            margin-bottom: 15px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        p {
            color: #5d6d7e;
            font-size: 18px;
            margin-bottom: 35px;
        }

        .btn-donate {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-donate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ong Ser Sempre Mais!</h1>
        <p>Promovendo um mundo inclusivo</p>
        <button class="btn-donate" aria-label="Fazer uma doação para a ONG">DOE AGORA</button>
    </div>

</body>
</html>
